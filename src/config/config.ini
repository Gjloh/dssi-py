[Directories]
models = models
metadata = metadata

[Model]
name = rent_model
# Features include engineered year/month plus categorical attributes
features = year,month,town,block,street_name,flat_type
categorical_features = town,block,street_name,flat_type
label = monthly_rent
test_size = 0.2

[Evaluation]
# Minimum acceptable R² score for model persistence
r2 = 0.5

[API]
home = /welcome
monthly_rent = /api/v1/rent
